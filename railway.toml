[build]
builder = "nixpacks"
installCommand = "pnpm install --no-frozen-lockfile"
buildCommand = "echo 'Skipping build...'"

[deploy]
# Используем npx, чтобы точно найти ts-node внутри папки
startCommand = "cd artifacts/api-server && npx ts-node src/index.ts"
healthcheckPath = ""
restartPolicyType = "on_failure"
