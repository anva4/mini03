[build]
builder = "nixpacks"
installCommand = "pnpm install --no-frozen-lockfile"
# Мы заменяем билд на простую команду, которая ничего не делает
buildCommand = "echo 'Skipping typecheck...'"

[deploy]
# Пробуем запустить сервер напрямую. 
# Судя по логам, он лежит в artifacts/api-server
startCommand = "node artifacts/api-server/dist/index.mjs"
healthcheckPath = ""
restartPolicyType = "on_failure"
